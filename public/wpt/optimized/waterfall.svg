<svg width="600" height="280" viewBox="0 0 600 280" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="9">
  <rect width="600" height="280" fill="#0a0a0a"/>

  <!-- Time axis labels -->
  <text x="120" y="14" fill="#555">0</text>
  <text x="176" y="14" fill="#555">0.5s</text>
  <text x="232" y="14" fill="#555">1s</text>
  <text x="288" y="14" fill="#555">1.5s</text>
  <text x="344" y="14" fill="#555">2s</text>

  <!-- Grid lines -->
  <line x1="176" y1="18" x2="176" y2="260" stroke="#1e1e1e" stroke-width="1"/>
  <line x1="232" y1="18" x2="232" y2="260" stroke="#1e1e1e" stroke-width="1"/>
  <line x1="288" y1="18" x2="288" y2="260" stroke="#1e1e1e" stroke-width="1"/>
  <line x1="344" y1="18" x2="344" y2="260" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Row 1: HTML (SSR — arrives fast, content inside) -->
  <text x="5" y="33" fill="#aaa">HTML (SSR)</text>
  <rect x="120" y="22" width="22" height="14" fill="#22c55e" rx="2"/>
  <text x="146" y="33" fill="#555">180ms — full content ✅</text>

  <!-- Row 2: _next/static/css (cached immutable) -->
  <text x="5" y="53" fill="#aaa">app.css</text>
  <rect x="120" y="42" width="8" height="14" fill="#22c55e" rx="2"/>
  <text x="132" y="53" fill="#22c55e">cached ∞</text>

  <!-- Row 3: main chunk (code-split, small) -->
  <text x="5" y="73" fill="#aaa">main.js (split)</text>
  <rect x="120" y="62" width="18" height="14" fill="#3b82f6" rx="2"/>
  <text x="142" y="73" fill="#555">124KB ✅</text>

  <!-- Row 4: image-1 (priority preload, avif) -->
  <text x="5" y="93" fill="#aaa">hero.avif (preload)</text>
  <rect x="120" y="82" width="24" height="14" fill="#22c55e" rx="2"/>
  <text x="148" y="93" fill="#22c55e">preloaded, 18KB ✅</text>

  <!-- Row 5–7: other images (lazy, avif) — parallel -->
  <text x="5" y="113" fill="#aaa">img-2.avif (lazy)</text>
  <rect x="154" y="102" width="14" height="14" fill="#22c55e" rx="2"/>
  <text x="172" y="113" fill="#555">21KB</text>

  <text x="5" y="133" fill="#aaa">img-3.avif (lazy)</text>
  <rect x="154" y="122" width="14" height="14" fill="#22c55e" rx="2"/>

  <text x="5" y="153" fill="#aaa">img-4.avif (lazy)</text>
  <rect x="154" y="142" width="14" height="14" fill="#22c55e" rx="2"/>

  <!-- Row 8: API (ISR — from cache) -->
  <text x="5" y="173" fill="#aaa">API /posts (ISR)</text>
  <rect x="120" y="162" width="6" height="14" fill="#22c55e" rx="2"/>
  <text x="130" y="173" fill="#22c55e">cache HIT ✅</text>

  <!-- Row 9: chart.js (lazy, deferred) -->
  <text x="5" y="193" fill="#aaa">chart.js (lazy)</text>
  <rect x="210" y="182" width="20" height="14" fill="#3b82f6" rx="2"/>
  <text x="234" y="193" fill="#555">deferred until visible</text>

  <!-- LCP marker -->
  <line x1="224" y1="18" x2="224" y2="260" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="192" y="265" fill="#22c55e">LCP 1.2s ✅</text>

  <!-- Summary -->
  <rect x="5" y="270" width="590" height="14" fill="#0a1a0a" rx="2"/>
  <text x="10" y="280" fill="#22c55e">Total: 1.2s | Requests: 9 | Transfer: 422KB | ✅ ISR cache | ✅ Code split | ✅ avif images | ✅ Preload hero</text>
</svg>
