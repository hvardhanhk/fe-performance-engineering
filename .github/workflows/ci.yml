##
# CI Pipeline — FE Performance Lab
#
# Steps:
# 1. Install & type-check
# 2. Lint (ESLint)
# 3. Unit tests (Jest)
# 4. Production build
# 5. Lighthouse CI (performance budgets)
# 6. E2E tests (Playwright) — optional, runs on push to main
# 7. Docker build smoke test
#
# Performance budget enforcement:
# Lighthouse CI runs against the production build and fails the pipeline
# if any assertion in .lighthouserc.js is violated. This means a PR that
# regresses LCP on /optimized will be blocked automatically.
##

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # ─── 1. Install + Type-check ────────────────────────────────────────────────
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

  # ─── 2. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

  # ─── 3. Unit tests ──────────────────────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Jest
        run: npm test -- --ci --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  # ─── 4. Build ───────────────────────────────────────────────────────────────
  build:
    name: Production build
    runs-on: ubuntu-latest
    needs: [typecheck, lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        # Fails the build if any high or critical CVE is found in dependencies.
        # Use --audit-level=moderate to tighten further once all current
        # advisories are resolved.
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next/
          retention-days: 1
          include-hidden-files: true

  # ─── 5. Lighthouse CI ───────────────────────────────────────────────────────
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download build
        uses: actions/download-artifact@v8
        with:
          name: next-build
          path: .next/

      # Split autorun into explicit phases so reports are always written to
      # .lighthouseci/ before assert can exit with code 1.
      - name: Collect Lighthouse data
        run: npx lhci collect
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Assert performance budgets
        run: npx lhci assert

      # Upload posts results to temporary-public-storage and triggers the
      # Lighthouse CI GitHub App to post a status check on the PR/commit.
      # The token is what authorises the App to write that check.
      - name: Upload reports + post GitHub status
        run: npx lhci upload
        if: always()
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse reports as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-reports
          path: .lighthouseci/
          retention-days: 30
          if-no-files-found: warn

  # ─── 5b. Lighthouse CI (mobile) ────────────────────────────────────────────
  lighthouse-mobile:
    name: Lighthouse CI (mobile)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download build
        uses: actions/download-artifact@v8
        with:
          name: next-build
          path: .next/

      - name: Collect Lighthouse data (mobile)
        run: npx lhci collect --config=.lighthouserc.mobile.js
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Assert performance budgets (mobile)
        run: npx lhci assert --config=.lighthouserc.mobile.js

      - name: Upload reports + post GitHub status (mobile)
        run: npx lhci upload --config=.lighthouserc.mobile.js
        if: always()
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse mobile reports as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-reports-mobile
          path: .lighthouseci/
          retention-days: 30
          if-no-files-found: warn

  # ─── 6. E2E (Playwright) — only on push to main ────────────────────────────
  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: build
    if:  false #github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download build
        uses: actions/download-artifact@v8
        with:
          name: next-build
          path: .next/

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          NEXT_TELEMETRY_DISABLED: 1

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ─── 7. Docker smoke test ───────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build --build-arg DOCKER_BUILD=true -t fe-perf-lab:ci .

      - name: Smoke test container
        run: |
          docker run -d --name test-container -p 3000:3000 fe-perf-lab:ci
          sleep 5
          curl -f http://localhost:3000/ || exit 1
          docker stop test-container
